spring:
  application:
    name: furniture-catalog
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
      file-size-threshold: 2MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
  forward-headers-strategy: framework

# Global API prefix applied to all @RestController mappings
api:
  base-path: /api/v1

# Application-specific config
app:
  cors:
    # Comma-separated origins, override via APP_CORS_ALLOWED_ORIGINS
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    exposed-headers: Location,Content-Disposition
    allow-credentials: true
    max-age: 3600

  storage:
    # Pluggable: "local" now, "s3" later — same StorageService interface
    provider: ${APP_STORAGE_PROVIDER:local}
    local:
      # Absolute path on disk where uploaded files live
      root-path: ${APP_STORAGE_LOCAL_ROOT:./var/uploads}
      # Public URL prefix used to build image URLs in API responses
      public-base-url: ${APP_STORAGE_PUBLIC_BASE_URL:http://localhost:8080/media}
      # URL path where Spring serves the files from root-path
      url-path: /media

  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-me-in-prod-please-min-32-chars-long}
      access-token-ttl: PT1H
      refresh-token-ttl: P7D
      issuer: furniture-catalog

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.company.furniturecatalog: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
