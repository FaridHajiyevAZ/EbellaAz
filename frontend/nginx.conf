server {
  listen 80;
  server_name _;

  # Serve the React SPA from the image's html dir.
  root /usr/share/nginx/html;
  index index.html;

  # Security: don't reveal nginx version
  server_tokens off;

  # Gzip basics — enable Brotli at the edge / CDN if you have it.
  gzip on;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Hashed Vite assets are immutable
  location ~* ^/assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Health probe (used by docker HEALTHCHECK / load balancers)
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # API and uploaded media — proxied to the Spring backend.
  location /api/ {
    proxy_pass         http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Trace-Id        $request_id;
    proxy_read_timeout 30s;
    client_max_body_size 50m;
  }

  location /media/ {
    proxy_pass         http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_cache_valid  200 7d;
    add_header         Cache-Control "public, max-age=604800";
  }

  # SPA fallback — every unknown path renders index.html so React Router takes over.
  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-store, must-revalidate";
  }
}
