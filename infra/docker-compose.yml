# =============================================================================
# Ebella — full-stack compose for local + staging.
#
# Bring up:   docker compose --env-file infra/.env -f infra/docker-compose.yml up -d --build
# Tear down:  docker compose -f infra/docker-compose.yml down
# Logs:       docker compose -f infra/docker-compose.yml logs -f backend
#
# Production: same compose works behind a TLS reverse proxy (Caddy / Cloudflare
# tunnel / nginx-proxy / Traefik). For real prod, run Postgres on a managed
# service and remove the `db` definition.
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ebella-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-furniture_catalog}
      POSTGRES_USER: ${POSTGRES_USER:-furniture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-furniture}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-furniture} -d ${POSTGRES_DB:-furniture_catalog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ebella-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-furniture_catalog}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-furniture}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-furniture}
      APP_CORS_ALLOWED_ORIGINS: ${PUBLIC_SITE_URL:-http://localhost}
      APP_STORAGE_PROVIDER: local
      APP_STORAGE_LOCAL_ROOT: /var/app/uploads
      APP_STORAGE_PUBLIC_BASE_URL: ${PUBLIC_SITE_URL:-http://localhost}/media
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET must be set in .env}
      APP_BOOTSTRAP_ADMIN_ENABLED: ${APP_BOOTSTRAP_ADMIN_ENABLED:-false}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:-admin@ebellaaz.local}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_ADMIN_NAME: ${APP_BOOTSTRAP_ADMIN_NAME:-Site Administrator}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-false}
    volumes:
      - uploads:/var/app/uploads
    networks: [internal]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Same-origin so the SPA hits /api/v1 via this nginx, no CORS in the browser.
        VITE_API_BASE_URL: /api/v1
        VITE_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost}
    container_name: ebella-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${PUBLIC_PORT:-80}:80"
    networks: [internal]

volumes:
  db_data:
  uploads:

networks:
  internal:
    driver: bridge
